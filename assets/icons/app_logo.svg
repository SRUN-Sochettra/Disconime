<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Disconime logo">
  <defs>
    <linearGradient id="gPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <linearGradient id="gGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="gSpot" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0B1020" flood-opacity="0.28"/>
    </filter>

    <filter id="shadowTight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0B1020" flood-opacity="0.28"/>
    </filter>

    <clipPath id="clipIcon">
      <rect x="64" y="64" width="232" height="232" rx="56" ry="56"/>
    </clipPath>

    <style>
      :root{--ink:#0B1020;--bg:#0B1020}
      .word{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; font-weight: 800; letter-spacing: -0.02em}
      .tag{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 600; letter-spacing: 0.10em}
    </style>
  </defs>

  <!-- Mark -->
  <g filter="url(#shadowSoft)">
    <rect x="48" y="48" width="264" height="264" rx="64" fill="url(#gPrimary)"/>
    <g clip-path="url(#clipIcon)">
      <!-- subtle inner sheen -->
      <path d="M64,92 C120,64 190,66 244,104 C278,128 300,164 296,204 C292,242 266,274 232,292 C194,312 140,314 98,292 C70,278 52,256 48,232 C44,210 50,112 64,92 Z"
            fill="url(#gSpot)" opacity="0.75"/>
      <rect x="64" y="64" width="232" height="232" rx="56" fill="url(#gGlass)" opacity="0.55"/>

      <!-- Discovery "radar" rings -->
      <g opacity="0.92" fill="none" stroke="#FFFFFF" stroke-linecap="round">
        <circle cx="180" cy="190" r="78" stroke-opacity="0.28" stroke-width="10"/>
        <circle cx="180" cy="190" r="52" stroke-opacity="0.32" stroke-width="10"/>
        <circle cx="180" cy="190" r="26" stroke-opacity="0.36" stroke-width="10"/>
      </g>

      <!-- Play / discovery pointer -->
      <g filter="url(#shadowTight)">
        <path d="M168 142 L236 190 L168 238 Z" fill="#FFFFFF" opacity="0.98"/>
      </g>

      <!-- Sparkles (anime vibe) -->
      <g fill="#FFFFFF" opacity="0.92">
        <path d="M96 124 l10 0 0 -10 0 10 10 0 -10 0 0 10 0 -10z" opacity="0.65"/>
        <path d="M266 124 l10 0 0 -10 0 10 10 0 -10 0 0 10 0 -10z" opacity="0.55"/>
        <path d="M116 260 l12 0 0 -12 0 12 12 0 -12 0 0 12 0 -12z" opacity="0.55"/>
      </g>

      <!-- Small "D" hidden mark -->
      <path d="M108 212
               c0 -46 28 -76 76 -76
               h22 c18 0 34 6 46 18
               c12 12 18 28 18 46
               v0 c0 18 -6 34 -18 46
               c-12 12 -28 18 -46 18
               h-22 c-48 0 -76 -30 -76 -76z
               M156 190
               c0 22 12 34 32 34
               h16 c10 0 18 -3 24 -9
               c6 -6 9 -14 9 -24
               c0 -10 -3 -18 -9 -24
               c-6 -6 -14 -9 -24 -9
               h-16 c-20 0 -32 12 -32 32z"
            fill="#0B1020" opacity="0.18"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(360, 86)">
    <text class="word" x="0" y="116" font-size="112" fill="#0B1020">Disconime</text>
    <g transform="translate(4, 150)">
      <rect x="0" y="0" width="460" height="44" rx="22" fill="#0B1020" opacity="0.06"/>
      <text class="tag" x="20" y="30" font-size="18" fill="#0B1020" opacity="0.78">ANIME • DISCOVERY • PLAY</text>
      <circle cx="342" cy="22" r="5" fill="url(#gPrimary)"/>
      <circle cx="370" cy="22" r="5" fill="url(#gPrimary)" opacity="0.9"/>
      <circle cx="398" cy="22" r="5" fill="url(#gPrimary)" opacity="0.8"/>
    </g>
  </g>
</svg>